[tox]
minversion = 1.4.2
envlist = linters
skipsdist = True

[testenv]
deps = -r{toxinidir}/requirements.txt
       -r{toxinidir}/test-requirements.txt

[testenv:black]
install_command = pip install {opts} {packages}
commands =
  black -v {toxinidir}

[testenv:linters]
install_command = pip install {opts} {packages}
commands =
  black -v --diff --check {toxinidir}
  flake8 {posargs}

[testenv:venv]
commands = {posargs}

[testenv:ansible-test-sanity]
allowlist_externals =
    ansible-galaxy
    ansible-test
    mkdir
setenv =
    PATH = {env:HOME}/venv/bin:{env:PATH}
commands_pre =
    mkdir -p /tmp/{envname}
    ansible-galaxy collection install {toxinidir} --collections-path /tmp/{envname} --force
changedir = /tmp/{envname}/ansible_collections/openvswitch/openvswitch
commands =
    ansible-test sanity -v --venv {posargs}

[testenv:ansible-test-unit]
allowlist_externals =
    ansible-galaxy
    ansible-test
    mkdir
setenv =
    PATH = {env:HOME}/venv/bin:{env:PATH}
commands_pre =
    mkdir -p /tmp/{envname}
    ansible-galaxy collection install {toxinidir} --collections-path /tmp/{envname} --force
changedir = /tmp/{envname}/ansible_collections/openvswitch/openvswitch
commands =
    ansible-test units -v --venv {posargs}

[flake8]
# E123, E125 skipped as they are invalid PEP-8.

show-source = True
ignore = E123,E125,E402,E501,E741,W503
max-line-length = 160
builtins = _
exclude = .git,.tox,tests/unit/compat/
